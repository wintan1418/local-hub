<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Offline · Radius</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,sans-serif; background:#f8fafc; color:#0f172a; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:2rem; }
    .wrap { max-width:400px; text-align:center; }
    .icon { width:72px; height:72px; border-radius:16px; background:linear-gradient(135deg,#f97316,#f43f5e); display:flex; align-items:center; justify-content:center; margin:0 auto 1.5rem; box-shadow:0 20px 40px -10px rgba(249,115,22,0.3); }
    h1 { font-size:1.5rem; font-weight:800; margin:0 0 0.5rem; }
    p { color:#64748b; line-height:1.6; margin:0 0 1.5rem; font-size:0.9rem; }
    button { background:#0f172a; color:white; border:none; padding:0.75rem 1.5rem; border-radius:0.75rem; font-weight:600; font-size:0.875rem; cursor:pointer; transition:all 0.2s; }
    button:hover { background:#1e293b; transform:translateY(-1px); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="icon"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><circle cx="12" cy="12" r="3"/><circle cx="12" cy="12" r="7" opacity="0.6"/><circle cx="12" cy="12" r="11" opacity="0.3"/></svg></div>
    <h1>You're offline</h1>
    <p>Looks like you lost your connection. Check your network and try again — we'll load up as soon as you're back.</p>
    <button onclick="location.reload()">Try Again</button>
  </div>
</body>
</html>
